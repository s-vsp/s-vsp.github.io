<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Scanline eye publications card</title>
  <desc id="desc">Dark circular eye rendered with scanlines, halftone texture, and publication data accents.</desc>
  <defs>
    <clipPath id="disc">
      <circle cx="776" cy="315" r="244"/>
    </clipPath>
    <pattern id="scan" width="9" height="9" patternUnits="userSpaceOnUse">
      <rect width="9" height="9" fill="#0b1016"/>
      <rect width="9" height="1.4" fill="#d69a38" opacity=".58"/>
      <rect y="3.3" width="9" height="1" fill="#2d6cdf" opacity=".46"/>
      <rect x="1" width="1.1" height="9" fill="#ffffff" opacity=".13"/>
      <rect x="6" width="1" height="9" fill="#12a594" opacity=".3"/>
    </pattern>
    <filter id="roughen">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" seed="11" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .38"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <radialGradient id="iris" cx="50%" cy="48%" r="58%">
      <stop offset="0" stop-color="#d6e6f8"/>
      <stop offset=".32" stop-color="#516f86"/>
      <stop offset=".72" stop-color="#151e27"/>
      <stop offset="1" stop-color="#020408"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#0b1016"/>
  <g opacity=".88">
    <rect x="96" y="126" width="318" height="24" rx="12" fill="#d69a38" opacity=".36"/>
    <rect x="96" y="178" width="438" height="22" rx="11" fill="#2d6cdf" opacity=".26"/>
    <rect x="96" y="228" width="365" height="22" rx="11" fill="#12a594" opacity=".22"/>
    <path d="M96 392h142l48-86 68 218 67-147h142" fill="none" stroke="#d69a38" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" opacity=".72"/>
    <circle cx="96" cy="392" r="16" fill="#e64b5d"/>
    <circle cx="238" cy="392" r="13" fill="#2d6cdf"/>
    <circle cx="286" cy="306" r="13" fill="#12a594"/>
    <circle cx="354" cy="524" r="13" fill="#d69a38"/>
    <circle cx="421" cy="377" r="13" fill="#2d6cdf"/>
    <circle cx="563" cy="377" r="16" fill="#12a594"/>
  </g>
  <g clip-path="url(#disc)">
    <rect x="532" y="71" width="488" height="488" fill="url(#scan)"/>
    <path d="M532 319c74-92 155-138 244-138 91 0 172 46 244 138-72 86-153 129-244 129-89 0-170-43-244-129z" fill="#111820" opacity=".87"/>
    <path d="M555 319c68-73 142-109 221-109 82 0 155 36 221 109-66 65-139 98-221 98-79 0-153-33-221-98z" fill="#263849" opacity=".72" filter="url(#roughen)"/>
    <path d="M565 298c69-94 142-139 221-136 76 2 145 47 204 136-74-40-146-60-218-60-70 0-139 20-207 60z" fill="#030609" opacity=".95"/>
    <path d="M563 348c75 39 146 58 214 56 67-1 137-20 210-56-60 75-131 114-212 116-80 2-151-37-212-116z" fill="#030609" opacity=".93"/>
    <circle cx="776" cy="322" r="92" fill="url(#iris)" opacity=".92"/>
    <circle cx="776" cy="322" r="43" fill="#010205"/>
    <ellipse cx="792" cy="299" rx="22" ry="12" fill="#d6e6f8" opacity=".55"/>
    <rect x="532" y="71" width="488" height="488" fill="url(#scan)" opacity=".78"/>
    <path d="M532 175h488M532 241h488M532 378h488M532 456h488" stroke="#020408" stroke-width="10" opacity=".47"/>
    <path d="M656 71v488M852 71v488M931 71v488" stroke="#d69a38" stroke-width="2.4" opacity=".45"/>
  </g>
  <circle cx="776" cy="315" r="244" fill="none" stroke="#2a333d" stroke-width="12"/>
  <circle cx="776" cy="315" r="251" fill="none" stroke="#05080c" stroke-width="10"/>
</svg>
